name: Bump cask on new release

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Get current version from cask
        id: current_version
        run: |
          CASK_FILE="./Casks/siyuan-unlock.rb"
          CURRENT_VERSION=$(grep 'version' "$CASK_FILE" | head -1 | awk -F'"' '{print $2}')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $CURRENT_VERSION"

      - name: Get latest version from GitHub API
        id: latest_version
        run: |
          REPO="appdev/siyuan-unlock"
          # 获取 release 信息，包含错误处理
          RESPONSE=$(curl -s -w "%{http_code}" "https://api.github.com/repos/$REPO/releases/latest")
          HTTP_CODE="${RESPONSE: -3}"
          BODY="${RESPONSE%???}"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "GitHub API 返回 HTTP $HTTP_CODE"
            echo "body: $BODY"
            exit 1
          fi
          LATEST_TAG=$(echo "$BODY" | jq -r .tag_name)
          if [[ "$LATEST_TAG" == "null" || -z "$LATEST_TAG" ]]; then
            echo "无法解析 tag_name，响应内容: $BODY"
            exit 1
          fi
          LATEST_VERSION=${LATEST_TAG#v}
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "最新版本: $LATEST_VERSION"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current_version.outputs.current_version }}"
          LATEST="${{ steps.latest_version.outputs.latest_version }}"
          # 防御：如果 LATEST 为空或 null，终止
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "最新版本无效，终止流程"
            exit 1
          fi
          if [[ "$CURRENT" != "$LATEST" ]]; then
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "✅ 需要更新: $CURRENT → $LATEST"
          else
            echo "⏺ 已是最新: $CURRENT"
          fi

      - name: Setup Homebrew tap
        if: steps.compare.outputs.new_version
        run: |
          brew tap --force "${GITHUB_REPOSITORY}"
          brew tap-info "${GITHUB_REPOSITORY}"

      - name: Run bump-cask-pr
        if: steps.compare.outputs.new_version
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 确保 new_version 非空（再次检查）
          VERSION="${{ steps.compare.outputs.new_version }}"
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "错误：版本号无效 '$VERSION'"
            exit 1
          fi
          brew bump-cask-pr siyuan-unlock \
            --version="$VERSION" \
            --no-audit \
            --no-fork
