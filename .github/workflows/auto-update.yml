name: Bump cask on new release

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    permissions:
      contents: write      # 用于 push 分支
      pull-requests: write # 用于创建 PR
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4

      - name: Setup Homebrew
        run: |
          # 将当前仓库添加为 Homebrew tap（临时）
          brew tap --force "${GITHUB_REPOSITORY}"
          # 确保 brew 能找到 cask
          brew update --force --quiet

      - name: Check for update
        id: check
        run: |
          # 使用绝对路径或相对路径指向 cask 文件，避免搜索其他 tap
          CASK_FILE="./Casks/siyuan-unlock.rb"
          # 直接运行 livecheck 并获取最新版本号（--quiet 只输出版本号）
          LATEST_VERSION=$(brew livecheck --newer-only --quiet "$CASK_FILE" 2>/dev/null || echo "")
          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "false" ]; then
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "✅ 发现新版本: $LATEST_VERSION"
          else
            echo "⏺ 无更新或检测失败"
          fi

      - name: Run bump-cask-pr
        if: steps.check.outputs.new_version
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CASK_FILE="./Casks/siyuan-unlock.rb"
          brew bump-cask-pr "$CASK_FILE" \
            --version="${{ steps.check.outputs.new_version }}" \
            --no-audit \
            --no-fork
