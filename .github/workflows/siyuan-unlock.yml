name: Bump cask on new release

on:
  schedule:
    - cron: '0 12 * * 3,4'
  workflow_dispatch:

jobs:
  bump:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout tap
        uses: actions/checkout@v5

      - name: Get current version from cask
        id: current_version
        run: |
          CASK_FILE="./Casks/siyuan-unlock.rb"
          CURRENT_VERSION=$(grep 'version' "$CASK_FILE" | head -1 | awk -F'"' '{print $2}')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $CURRENT_VERSION"

      - name: Get latest version using gh CLI
        id: latest_version
        run: |
          LATEST_VERSION=$(gh release list --repo "appdev/siyuan-unlock" \
            --limit 1 --json tagName --jq '.[0].tagName' | sed 's/^v//')
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current_version.outputs.current_version }}"
          LATEST="${{ steps.latest_version.outputs.latest_version }}"
          # 防御：如果 LATEST 为空或 null，终止
          if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
            echo "最新版本无效，终止流程"
            exit 1
          fi
          if [[ "$CURRENT" != "$LATEST" ]]; then
            echo "new_version=$LATEST" >> $GITHUB_OUTPUT
            echo "✅ 需要更新: $CURRENT → $LATEST"
          else
            echo "⏺ 已是最新: $CURRENT"
          fi

      - name: Setup Homebrew tap
        if: steps.compare.outputs.new_version
        run: |
          brew tap --force "${GITHUB_REPOSITORY}"
          brew tap-info "${GITHUB_REPOSITORY}"
          brew trust "${GITHUB_REPOSITORY}"
      - name: Delete existing remote branch (if any)
        if: steps.compare.outputs.new_version
        run: |
          NEW_VERSION="${{ steps.compare.outputs.new_version }}"
          BRANCH_NAME="bump-siyuan-unlock-${NEW_VERSION}"
          # 删除远程分支（忽略错误，分支不存在时不影响后续）
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || echo "Branch not found, continuing..."
      - name: Run bump-cask-pr
        id: bump
        if: steps.compare.outputs.new_version
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          # 运行 bump-cask-pr 并捕获输出，从中提取 PR URL
          OUTPUT=$(brew bump-cask-pr siyuan-unlock \
            --version="${{ steps.compare.outputs.new_version }}" \
            --no-audit \
            --no-fork 2>&1 | tee /dev/stderr)
          sleep 5
    
          PR_URL=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH_NAME" \
            --state open \
            --json url --jq '.[0].url')
          
          if [ -n "$PR_URL" ]; then
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          else
            echo "没有找到 open 状态的 PR，可能创建失败"
            exit 1
          fi

      - name: Auto-merge PR
        if: steps.bump.outputs.pr_url
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
        run: |
          PR_URL="${{ steps.bump.outputs.pr_url }}"
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          # --auto 是启用 GitHub 原生自动合并的关键
          gh pr merge "$PR_NUMBER" --auto --merge --delete-branch
